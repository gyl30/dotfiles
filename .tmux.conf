# : << 'EOF'
# ==========================================
# Tmux 配置区
# ==========================================

bind r source-file ~/.tmux.conf \; display "Reloaded."

set-option -g status-position top

set -g base-index 1
set -g pane-base-index 1

# 必须启用 True Color (24-bit) 颜色支持
set -g default-terminal "screen-256color"
set -ag terminal-overrides ",*256col*:Tc"

bind m set-option -gF mouse "#{?mouse,off,on}" \; \display-message "#{?mouse,Mouse: ON,Mouse: OFF}"

set -g history-limit 5000
set -g renumber-windows on
set -g set-titles on

# ==========================================
# 状态栏设置 (扁平化纯色块 Tokyo Night 风格)
# ==========================================
set -g status-interval 5
set -g status-style "bg=#1a1b26,fg=#c0caf5"

# 【左侧状态栏】:[亮蓝背景 会话] (已去除 uptime)
set -g status-left-length 100
set -g status-left "#[bg=#7aa2f7,fg=#1a1b26,bold] ❐ #S "

# 【右侧状态栏】:[深蓝背景 SSH] +[深灰背景 内存 | 负载] + [亮蓝背景 日期时间]
set -g status-right-length 150
set -g status-right "#[bg=#292e42,fg=#c0caf5,nobold] #(sed -n 's/^# //p' ~/.tmux.conf | tr -d '\r' | bash -s get_ssh_info #{pane_tty}) #[bg=#414868,fg=#c0caf5,nobold] #(sed -n 's/^# //p' ~/.tmux.conf | tr -d '\r' | bash -s get_mem) | #(sed -n 's/^# //p' ~/.tmux.conf | tr -d '\r' | bash -s get_load) #[bg=#7aa2f7,fg=#1a1b26,bold] %Y-%m-%d %H:%M "

# ==========================================
# 状态栏 - 窗口名称格式
# ==========================================
set -wg window-status-separator ""

# 未激活窗口
set -wg window-status-format "#[bg=#1a1b26,fg=#a9b1d6] #I #W#{?#{||:#{window_bell_flag},#{window_zoomed_flag}}, ,}#{?window_bell_flag,!,}#{?window_zoomed_flag,Z,} "

# 当前激活窗口
set -wg window-status-current-format "#[bg=#9ece6a,fg=#1a1b26,bold] #I #W#{?#{||:#{window_bell_flag},#{window_zoomed_flag}}, ,}#{?window_bell_flag,!,}#{?window_zoomed_flag,Z,} "

setw -g monitor-bell off

